version: '3.8'

services:
  # n8n Workflow Automation
  n8n:
    image: n8nio/n8n:latest
    container_name: nexus_n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=nexus_n8n_password
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Karachi
      - BACKEND_URL=http://backend:8000
      - ML_SERVICE_URL=http://ml-inference:8001
      - FRONTEND_URL=http://localhost:3000
      - PUSH_SERVICE_URL=http://backend:8000/api/v1/notifications
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows
    depends_on:
      - backend
    networks:
      - nexus_network
    restart: unless-stopped

  # PostgreSQL with pgvector
  db:
    image: pgvector/pgvector:pg16
    container_name: nexus_db
    environment:
      POSTGRES_DB: nexus_ai_tutor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus_network

  # Redis for caching and Celery
  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus_network

  # Neo4j for Knowledge Graph
  neo4j:
    image: neo4j:5-community
    container_name: nexus_neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - nexus_network

  # Django Backend
  backend:
    build:
      context: ../backend
      dockerfile: ../infrastructure/docker/backend/Dockerfile
    container_name: nexus_backend
    environment:
      - DJANGO_ENV=development
      - DEBUG=True
      - SECRET_KEY=nexus-dev-secret-key-change-in-production
      - POSTGRES_DB=nexus_ai_tutor
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - N8N_WEBHOOK_URL=http://n8n:5678
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - ../ml_models:/app/ml_models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
    networks:
      - nexus_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # Celery Worker
  celery:
    build:
      context: ../backend
      dockerfile: ../infrastructure/docker/backend/Dockerfile
    container_name: nexus_celery
    environment:
      - DJANGO_ENV=development
      - POSTGRES_DB=nexus_ai_tutor
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    volumes:
      - ../backend:/app
      - ../ml_models:/app/ml_models
    depends_on:
      - db
      - redis
      - backend
    networks:
      - nexus_network
    command: celery -A config worker -l INFO -Q default,ml,reports

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: ../backend
      dockerfile: ../infrastructure/docker/backend/Dockerfile
    container_name: nexus_celery_beat
    environment:
      - DJANGO_ENV=development
      - POSTGRES_DB=nexus_ai_tutor
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    volumes:
      - ../backend:/app
    depends_on:
      - db
      - redis
      - backend
    networks:
      - nexus_network
    command: celery -A config beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ML Inference Service
  ml-inference:
    build:
      context: ../backend
      dockerfile: ../infrastructure/docker/ml/Dockerfile
    container_name: nexus_ml_inference
    environment:
      - ML_DEVICE=cpu
      - MODEL_PATH=/app/ml_models
    ports:
      - "8001:8001"
    volumes:
      - ../backend:/app
      - ../ml_models:/app/ml_models
    networks:
      - nexus_network
    command: python -m uvicorn ml.inference.server:app --host 0.0.0.0 --port 8001

  # Next.js Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: ../infrastructure/docker/frontend/Dockerfile
    container_name: nexus_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NEXT_PUBLIC_N8N_WEBHOOK_URL=http://localhost:5678
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - nexus_network
    command: npm run dev

  # MinIO (S3 compatible storage)
  minio:
    image: minio/minio:latest
    container_name: nexus_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - nexus_network
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  n8n_data:
  minio_data:


networks:
  nexus_network:
    name: nexus_network
    driver: bridge
